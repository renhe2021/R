<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资选股分析面板</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <!-- 侧边导航 -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <span>选股分析</span>
            </div>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-item active" data-page="analyze">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
                股票分析
            </a>
            <a href="#" class="nav-item" data-page="books">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                知识库
            </a>
            <a href="#" class="nav-item" data-page="search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                语义搜索
            </a>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">

        <!-- ====== 股票分析页 ====== -->
        <section id="page-analyze" class="page active">
            <div class="page-header">
                <h1>股票分析</h1>
                <p class="subtitle">输入股票代码，基于价值投资规则进行量化评估</p>
            </div>

            <!-- 搜索栏 -->
            <div class="search-bar">
                <div class="input-group">
                    <input type="text" id="stock-input" placeholder="输入股票代码，如 AAPL, MSFT, NVDA..." autocomplete="off">
                    <select id="data-source">
                        <option value="yfinance">yfinance (免费)</option>
                        <option value="finnhub">Finnhub (免费, 60次/分)</option>
                        <option value="fmp">FMP (Financial Modeling Prep)</option>
                        <option value="bloomberg">Bloomberg</option>
                        <option value="auto">自动选择</option>
                    </select>
                    <select id="book-filter">
                        <option value="">全部规则</option>
                    </select>
                    <button id="btn-analyze" onclick="analyzeStock()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                        </svg>
                        分析
                    </button>
                    <button id="btn-cross" onclick="crossValidate()" class="btn-secondary" title="用多个数据源交叉验证">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 3h5v5"></path>
                            <path d="M8 3H3v5"></path>
                            <path d="M12 22v-8.3a4 4 0 0 0-1.172-2.872L3 3"></path>
                            <path d="m15 9 6-6"></path>
                        </svg>
                        交叉验证
                    </button>
                </div>
            </div>

            <!-- 加载状态 -->
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>正在获取数据并评估规则，请稍候...</p>
            </div>

            <!-- 交叉验证结果 -->
            <div id="cross-result" class="hidden">
                <div class="cross-header">
                    <h2>多数据源交叉验证</h2>
                    <p id="cross-summary" class="subtitle"></p>
                    <button class="close-btn" onclick="document.getElementById('cross-result').classList.add('hidden')">&times;</button>
                </div>
                <div class="cross-stats" id="cross-stats"></div>
                <div class="cross-table-wrap">
                    <table class="cross-table" id="cross-table">
                        <thead id="cross-thead"></thead>
                        <tbody id="cross-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 分析结果 -->
            <div id="result-area" class="hidden">

                <!-- 顶部概览卡片 -->
                <div class="overview-cards">
                    <div class="card stock-card">
                        <div class="stock-header">
                            <div>
                                <h2 id="stock-name">—</h2>
                                <span id="stock-symbol" class="symbol-tag">—</span>
                                <span id="stock-sector" class="sector-tag">—</span>
                            </div>
                            <div class="price-block">
                                <span id="stock-price" class="price">—</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 规则评估总览 -->
                <div class="rule-summary">
                    <div class="summary-ring">
                        <svg viewBox="0 0 120 120">
                            <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
                            <circle id="ring-progress" class="ring-fill" cx="60" cy="60" r="50"></circle>
                        </svg>
                        <div class="ring-text">
                            <span id="pass-rate">—</span>
                            <small>通过率</small>
                        </div>
                    </div>
                    <div class="summary-stats">
                        <div class="stat-item passed">
                            <span class="stat-num" id="stat-passed">0</span>
                            <span class="stat-label">通过</span>
                        </div>
                        <div class="stat-item failed">
                            <span class="stat-num" id="stat-failed">0</span>
                            <span class="stat-label">不通过</span>
                        </div>
                        <div class="stat-item unknown">
                            <span class="stat-num" id="stat-unknown">0</span>
                            <span class="stat-label">无法评估</span>
                        </div>
                        <div class="stat-item total">
                            <span class="stat-num" id="stat-total">0</span>
                            <span class="stat-label">总规则</span>
                        </div>
                    </div>
                </div>

                <!-- 指标面板 -->
                <div class="metrics-grid">
                    <div class="metric-section">
                        <h3>估值指标</h3>
                        <div class="metric-cards" id="valuation-metrics"></div>
                    </div>
                    <div class="metric-section">
                        <h3>盈利能力</h3>
                        <div class="metric-cards" id="profitability-metrics"></div>
                    </div>
                    <div class="metric-section">
                        <h3>财务健康</h3>
                        <div class="metric-cards" id="financial-metrics"></div>
                    </div>
                    <div class="metric-section">
                        <h3>Graham 估值</h3>
                        <div class="metric-cards" id="graham-metrics"></div>
                    </div>
                </div>

                <!-- 历史数据 + 技术指标 -->
                <div class="metrics-grid">
                    <div class="metric-section">
                        <h3>历史数据 (10年)</h3>
                        <div class="metric-cards" id="history-metrics"></div>
                    </div>
                    <div class="metric-section">
                        <h3>技术指标 & 市场基准</h3>
                        <div class="metric-cards" id="technical-metrics"></div>
                    </div>
                </div>

                <!-- 规则详情 -->
                <div class="rules-detail">
                    <div class="rules-tabs">
                        <button class="tab active" data-tab="passed-rules">通过的规则</button>
                        <button class="tab" data-tab="failed-rules">不通过的规则</button>
                        <button class="tab" data-tab="unknown-rules">无法评估</button>
                    </div>

                    <div id="passed-rules" class="tab-content active">
                        <div class="rules-list" id="passed-list"></div>
                    </div>
                    <div id="failed-rules" class="tab-content">
                        <div class="rules-list" id="failed-list"></div>
                    </div>
                    <div id="unknown-rules" class="tab-content">
                        <div class="rules-list" id="unknown-list"></div>
                    </div>
                </div>

                <!-- LLM 深度分析 -->
                <div class="llm-section">
                    <button id="btn-llm" onclick="requestLLMAnalysis()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"></path>
                            <path d="M12 16v-4"></path>
                            <path d="M12 8h.01"></path>
                        </svg>
                        AI 深度分析报告
                    </button>
                    <div id="llm-result" class="llm-result hidden"></div>
                </div>
            </div>
        </section>

        <!-- ====== 知识库页 ====== -->
        <section id="page-books" class="page">
            <div class="page-header">
                <h1>知识库</h1>
                <p class="subtitle">已导入的投资书籍和提取的选股规则</p>
            </div>
            <div id="books-list" class="books-grid"></div>
            <div id="book-detail" class="book-detail hidden"></div>
        </section>

        <!-- ====== 语义搜索页 ====== -->
        <section id="page-search" class="page">
            <div class="page-header">
                <h1>语义搜索</h1>
                <p class="subtitle">用自然语言搜索投资知识库</p>
            </div>
            <div class="search-bar">
                <div class="input-group">
                    <input type="text" id="search-input" placeholder="例如：PE低于15的选股标准、格雷厄姆的防御型投资者策略...">
                    <button onclick="semanticSearch()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        搜索
                    </button>
                </div>
            </div>
            <div id="search-results" class="search-results"></div>
        </section>

    </main>

    <script src="/assets/app.js"></script>
</body>
</html>
